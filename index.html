<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV Interiors | Luxury Interior Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Playfair Display', serif;
            background-color: #ffffff;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
        }
        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            letter-spacing: 4px;
            font-weight: 400;
        }
        .hero {
            padding: 180px 20px;
            text-align: center;
            background-color: #fcfbf9; /* Clean, premium off-white background */
        }
        h1 {
            font-size: 3.5rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 15px;
        }
        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #707070;
            margin-bottom: 40px;
        }
        .btn {
            font-family: 'Montserrat', sans-serif;
            text-decoration: none;
            color: #1a1a1a;
            border: 1px solid #1a1a1a;
            padding: 14px 35px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 3px;
            transition: 0.4s ease;
        }
        .btn:hover {
            background: #1a1a1a;
            color: #fff;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SV INTERIORS</div>
    </header>

    <section class="hero">
        <h1>SV Interiors</h1>
        <div class="subtitle">Curating Spaces. Defining Luxury Living.</div>
        <a href="#" class="btn">Explore Portfolio</a>
    </section>

</body>
</html>
